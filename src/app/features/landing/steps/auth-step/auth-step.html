<div class="auth-window">
    <div class="auth-form">
        <div class="title">
            <p class="title-text">Create an Account</p>
        </div>
        <div class="social-signup">
            <!--Social sign ups here-->
        </div>
        <div class="separator"></div>
        <div class="supabase-auth-form">
                <input type="email" name="pmail" id="email" placeholder="Enter email..." [(ngModel)]="formData.email">
                <input type="password" name="password" id="password" placeholder="Enter password..." [(ngModel)]="formData.password">
                <button class="next-btn" (click)="submitData()">Next</button>
        </div>
    </div>
</div>
