<div class="auth-window">
    <div class="auth-form">
        <div class="title">
            <p class="title-text">Create an Account</p>
        </div>
        <form class="supabase-auth-form" #authForm="ngForm" (ngSubmit)="submitData()">
            <input
                type="email"
                name="email"
                id="email"
                placeholder="Enter email..."
                [(ngModel)]="formData.email"
                required
                email
            >
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Enter password..."
                [(ngModel)]="formData.password"
                required
                minlength="6"
            >
            <button class="next-btn" type="submit" [disabled]="authForm.invalid || loading">Next</button>
        </form>
    </div>
</div>
